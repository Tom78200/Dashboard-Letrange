<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" href="Logo_Letrange_Paris_1838.webp" type="image/webp">
    <!-- 1. Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <!-- 2. Auth (Needs db.js) -->
    <script src="auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#5e5e5e",
                        "tertiary-container": "#737575",
                        "on-tertiary": "#e2e2e2",
                        "outline": "#777777",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#ababab",
                        "inverse-surface": "#2f3131",
                        "on-secondary-fixed-variant": "#3b3b3b",
                        "inverse-primary": "#c6c6c6",
                        "primary": "#000000",
                        "surface-tint": "#5e5e5e",
                        "primary-fixed-dim": "#474747",
                        "surface-dim": "#dadada",
                        "primary-container": "#3b3b3b",
                        "on-surface": "#1a1c1c",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary-fixed-variant": "#e2e2e2",
                        "outline-variant": "#c6c6c6",
                        "surface-container-low": "#f3f3f4",
                        "on-primary-container": "#ffffff",
                        "primary-fixed": "#5e5e5e",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#474747",
                        "on-background": "#1a1c1c",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#1b1b1b",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "on-error-container": "#410002",
                        "surface-container": "#eeeeee",
                        "surface-container-highest": "#e2e2e2",
                        "surface": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "tertiary-fixed": "#5d5f5f",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "tertiary": "#3a3c3c",
                        "background": "#f9f9f9",
                        "on-primary": "#e2e2e2",
                        "on-secondary-fixed": "#1b1b1b",
                        "on-tertiary-container": "#ffffff",
                        "secondary-fixed": "#c6c6c6",
                        "on-tertiary-fixed": "#ffffff",
                        "secondary-container": "#d4d4d4",
                        "tertiary-fixed-dim": "#454747",
                        "inverse-on-surface": "#f0f1f1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Sidebar overlay for mobile */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 40;
            backdrop-filter: blur(2px);
        }
        #sidebar-overlay.active {
            display: block;
        }

        /* Sidebar mobile state */
        #sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1023px) {
            #sidebar {
                transform: translateX(-100%);
                z-index: 50;
            }
            #sidebar.open {
                transform: translateX(0);
            }
        }

        /* Hamburger button */
        #hamburger-btn {
            display: none;
        }
        @media (max-width: 1023px) {
            #hamburger-btn {
                display: flex;
            }
        }

        .week-delete-btn {
            opacity: 1;
            transition: opacity 0.2s;
        }

        .drag-handle {
            cursor: grab;
            transition: color 0.2s;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .card-validated {
            background-color: rgba(240, 253, 244, 0.8) !important;
            border-color: #bbf7d0 !important;
        }
        .card-validated .status-badge {
            background-color: #22c55e;
            color: white;
            display: inline-flex;
        }
        .status-badge {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 2px 8px;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 2px;
            z-index: 10;
        }
    </style>
</head>

<body class="bg-surface text-on-surface">
    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SideNavBar Anchor -->
    <aside id="sidebar"
        class="fixed left-0 top-0 h-full flex flex-col pt-8 bg-[#F9F9F9] dark:bg-zinc-950 border-r border-zinc-200/50 dark:border-zinc-800/50 w-64">
        <div class="px-8 mb-12">
            <img src="Logo_Letrange_Paris_1838.webp" alt="LÉTRANGE Paris 1838" class="w-full h-auto dark:invert" />
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <!-- Active State: Board -->
            <a class="text-black dark:text-white font-bold flex items-center gap-3 py-2 px-4 bg-zinc-200/50 dark:bg-zinc-800/50 transition-all font-['Inter'] uppercase tracking-widest text-[0.6875rem]"
                href="#">
                <span class="material-symbols-outlined text-[18px]">grid_view</span>
                Board
            </a>
            <a class="text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-900 flex items-center gap-3 py-2 px-4 transition-all font-['Inter'] uppercase tracking-widest text-[0.6875rem]"
                href="library.html">
                <span class="material-symbols-outlined text-[18px]">video_library</span>
                Library
            </a>
        </nav>
        <div class="p-8 space-y-3">
            <button onclick="resetBoard()"
                class="w-full border border-zinc-200 text-zinc-400 py-3 px-4 text-[0.6875rem] font-bold uppercase tracking-widest hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-all">
                Réinitialiser le Board
            </button>
            <button onclick="dbLogout()"
                class="w-full border border-zinc-200 text-zinc-400 py-3 px-4 text-[0.6875rem] font-bold uppercase tracking-widest hover:bg-zinc-100 hover:text-black transition-all">
                Déconnexion
            </button>
        </div>
    </aside>
    <!-- Main Content Canvas -->
    <main class="lg:ml-64 min-h-screen bg-surface">
        <!-- Top Header for Context -->
        <header
            class="sticky top-0 z-40 bg-surface/80 backdrop-blur-xl border-b border-zinc-200/50 px-4 sm:px-8 lg:px-12 py-4 lg:py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Hamburger (mobile/tablet only) -->
                <button id="hamburger-btn" onclick="openSidebar()"
                    class="items-center justify-center w-9 h-9 hover:bg-zinc-100 transition-colors">
                    <span class="material-symbols-outlined text-[22px] text-on-surface-variant">menu</span>
                </button>
                <h2 class="text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Production
                    Dashboard</h2>
            </div>
            <div class="flex items-center gap-4 lg:gap-6">
                <button onclick="focusBoardSearch()"
                    class="material-symbols-outlined text-on-surface-variant hover:text-black cursor-pointer">search</button>
                <input id="board-search" type="text" placeholder="Rechercher (nom, produit, héritage, twist...)"
                    oninput="onBoardSearch(this.value)"
                    class="w-56 sm:w-72 border border-zinc-200 px-3 py-1.5 text-xs uppercase tracking-wider focus:outline-none focus:border-black transition-colors" />
            </div>
        </header>
        <div class="max-w-[1400px] mx-auto px-4 sm:px-8 lg:px-12 py-8 sm:py-12 lg:py-16 space-y-16 sm:space-y-24 lg:space-y-32">
            <!-- Dynamic Weeks -->
            <div id="dynamic-weeks" class="space-y-16 sm:space-y-24 lg:space-y-32 pb-16 sm:pb-24 lg:pb-32"></div>
            
            <!-- Loading Indicator -->
            <div id="loader" class="flex flex-col items-center justify-center py-20 opacity-0 transition-opacity">
                <div class="w-8 h-8 border-2 border-zinc-200 border-t-black rounded-full animate-spin"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest mt-4 text-zinc-400">Chargement des archives...</span>
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <div class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 lg:bottom-12 lg:right-12">
        <button onclick="addNewWeek()"
            class="bg-black text-white h-14 w-14 lg:h-16 lg:w-16 flex items-center justify-center hover:scale-105 transition-transform shadow-xl"
            title="Nouvelle semaine">
            <span class="material-symbols-outlined text-[22px] lg:text-[24px]">add</span>
        </button>
    </div>

    <script>
        // ── Sidebar ───────────────────────────────────────────
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        // ── Board State ───────────────────────────────────────
        let boardWeeks = [];
        let boardSearch = '';
        let imageMetaByUrl = new Map();
        
        // Pagination state
        let PAGE_SIZE = 8;
        let currentOffset = 0;
        let totalWeeks = 0;
        let isLoading = false;
        let hasMore = true;

        async function initBoard() {
            // Parallel fetch: Metadata + Total Count + First Page
            const [meta, total, firstPage] = await Promise.all([
                refreshImageMeta(),
                dbGetTotalWeeksCount(),
                dbGetAllWeeks(PAGE_SIZE, 0)
            ]);
            
            totalWeeks = total;
            boardWeeks = firstPage;
            hasMore = boardWeeks.length < totalWeeks;
            
            renderDynamicWeeks();
            initSortable();
            setupInfiniteScroll();
        }

        async function refreshImageMeta() {
            const allImages = await dbGetAllImages();
            imageMetaByUrl = new Map((allImages || []).map((img) => [img.url, img]));
        }

        function setupInfiniteScroll() {
            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 800) {
                    loadMoreWeeks();
                }
            });
        }

        async function loadMoreWeeks() {
            if (isLoading || !hasMore || boardSearch) return;
            
            isLoading = true;
            document.getElementById('loader').style.opacity = '1';
            
            currentOffset += PAGE_SIZE;
            
            const nextWeeks = await dbGetAllWeeks(PAGE_SIZE, currentOffset);
            if (nextWeeks.length === 0) {
                hasMore = false;
            } else {
                boardWeeks = [...boardWeeks, ...nextWeeks];
                hasMore = boardWeeks.length < totalWeeks;
                renderDynamicWeeks();
                initSortable();
            }
            
            isLoading = false;
            document.getElementById('loader').style.opacity = '0';
        }

        function focusBoardSearch() {
            const input = document.getElementById('board-search');
            if (input) input.focus();
        }

        function normalizeText(v) {
            return String(v || '').toLowerCase();
        }

        function matchesCardSearch(card) {
            const q = normalizeText(boardSearch).trim();
            if (!q) return true;
            const imageMeta = imageMetaByUrl.get(card.image || '') || {};
            const haystack = [
                card.title,
                card.code,
                card.prompt,
                card.corrective,
                card.primaryObjective,
                card.secondaryObjective,
                imageMeta.name,
                imageMeta.cat
            ].map(normalizeText).join(' ');
            return haystack.includes(q);
        }

        async function onBoardSearch(value) {
            boardSearch = value || '';
            if (boardSearch) {
                // If searching, we fetch a large batch to ensure we find results across the history
                boardWeeks = await dbGetAllWeeks(500, 0); 
            } else {
                // Reset to first page
                currentOffset = 0;
                boardWeeks = await dbGetAllWeeks(PAGE_SIZE, 0);
                hasMore = true;
            }
            renderDynamicWeeks();
        }

        function initSortable() {
            const el = document.getElementById('dynamic-weeks');
            Sortable.create(el, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'opacity-50',
                onEnd: async function() {
                    await handleSortEnd();
                }
            });
        }

        async function handleSortEnd() {
            const sections = document.querySelectorAll('#dynamic-weeks > section');
            const updatedWeeks = [];
            
            for (let i = 0; i < sections.length; i++) {
                const id = parseInt(sections[i].getAttribute('data-id'));
                const week = boardWeeks.find(w => w.id === id);
                if (week) {
                    updatedWeeks.push(week);
                }
            }
            
            boardWeeks = updatedWeeks;
            await renumberWeeks();
        }

        async function renumberWeeks() {
            for (let i = 0; i < boardWeeks.length; i++) {
                boardWeeks[i].number = i + 1;
                await dbUpdateWeek(boardWeeks[i]);
            }
            renderDynamicWeeks();
        }

        function getNextWeekNum() {
            if (boardWeeks.length === 0) return 1;
            return Math.max(...boardWeeks.map(w => w.number)) + 1;
        }

        // ── Add New Week ──────────────────────────────────────
        async function addNewWeek() {
            const week = {
                number: getNextWeekNum(),
                cards: [
                    { title: '', image: '', code: 'Héritage' },
                    { title: '', image: '', code: 'Twist' },
                    { title: '', image: '', code: 'Produit' }
                ],
                createdAt: Date.now()
            };
            const newId = await dbAddWeek(week);
            if (!newId) {
                const reason = (typeof dbGetLastError === 'function' ? dbGetLastError() : '') || 'Cause inconnue';
                alert(`Erreur de sauvegarde BDD: ${reason}`);
                return;
            }
            boardWeeks = await dbGetAllWeeks();
            renderDynamicWeeks();
            
            setTimeout(() => {
                const container = document.getElementById('dynamic-weeks');
                const lastSection = container.lastElementChild;
                if (lastSection) lastSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }

        // ── Render Weeks ──────────────────────────────────────
        function renderDynamicWeeks() {
            const container = document.getElementById('dynamic-weeks');
            container.innerHTML = '';
            const queryActive = normalizeText(boardSearch).trim().length > 0;

            if (boardWeeks.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 text-center">
                        <div class="w-20 h-20 border-2 border-dashed border-zinc-200 flex items-center justify-center mb-6">
                            <span class="material-symbols-outlined text-[36px] text-zinc-300">calendar_view_week</span>
                        </div>
                        <p class="text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-zinc-400 mb-2">Aucune semaine</p>
                        <p class="text-xs text-zinc-300 mb-8">Ajoutez votre première semaine de production</p>
                        <button onclick="addNewWeek()"
                            class="bg-black text-white px-6 py-3 text-[0.6875rem] font-bold uppercase tracking-widest hover:bg-zinc-800 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">add</span>
                            Nouvelle Semaine
                        </button>
                    </div>
                `;
                return;
            }

            boardWeeks.forEach((week, weekIdx) => {
                const cardsToRender = week.cards
                    .map((card, idx) => ({ card, idx }))
                    .filter(({ card }) => matchesCardSearch(card));
                if (queryActive && cardsToRender.length === 0) return;

                const numStr = String(week.number).padStart(2, '0');
                const hasContent = cardsToRender.some(({ card }) => card.image);

                const section = document.createElement('section');
                section.className = 'flex flex-col md:flex-row gap-8 lg:gap-12 pb-16';
                section.setAttribute('data-id', week.id);
                section.innerHTML = `
                    <div class="flex flex-row md:flex-col md:w-32 items-center md:items-start gap-3 md:gap-0 md:sticky md:top-28 lg:top-32 h-fit">
                        <span class="text-[2.5rem] sm:text-[3.5rem] font-black leading-none tracking-tighter text-primary${hasContent ? '' : '/20'}">${numStr}</span>
                        <span class="text-[0.6875rem] font-black uppercase tracking-[0.3em] md:rotate-180 md:[writing-mode:vertical-lr] md:mt-4 md:self-center ${hasContent ? 'text-on-surface-variant' : 'text-zinc-200'}">
                            SEMAINE
                        </span>
                        
                        <div class="flex flex-col gap-2 mt-4">
                            <button class="drag-handle text-zinc-300 hover:text-black transition-colors" title="Déplacer la semaine">
                                <span class="material-symbols-outlined text-[18px]">drag_indicator</span>
                            </button>
                            <button onclick="deleteWeek(${week.id})" class="md:mt-2 text-zinc-300 hover:text-red-500 transition-colors" title="Supprimer la semaine">
                                <span class="material-symbols-outlined text-[18px]">delete</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 lg:grid-cols-3 lg:gap-8">
                            ${cardsToRender.map(({ card, idx }) => renderCard(card, week.id, idx)).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });

            if (queryActive && container.childElementCount === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 text-center">
                        <p class="text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-zinc-400 mb-2">Aucun résultat</p>
                        <p class="text-xs text-zinc-300">Essayez un nom d'image, une catégorie ou un titre</p>
                    </div>
                `;
            }
        }

        function renderCard(card, weekId, cardIdx) {
            const slotTypes = ['Héritage', 'Twist', 'Produit'];
            const displayType = card.code || slotTypes[cardIdx] || `Slot ${String(cardIdx + 1).padStart(2, '0')}`;

            if (card && card.image) {
                return `
                    <div class="group bg-surface-container-lowest border border-outline-variant/15 p-1 hover:border-outline-variant/50 transition-all cursor-pointer relative ${card.status === 'validated' ? 'card-validated' : ''}" 
                         onclick="openCard(${weekId}, ${cardIdx})"
                         onmouseenter="startCarousel(this, ${weekId}, ${cardIdx})"
                         onmouseleave="stopCarousel(this, '${card.image}')">
                         <div class="status-badge">Validé</div>
                        <div class="relative aspect-video overflow-hidden mb-4">
                            <img class="card-thumb w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 scale-100 group-hover:scale-105" src="${card.image}" alt="${card.title || ''}" />
                            <div class="absolute inset-0 bg-black/10"></div>
                            ${card.resultVideo ? `
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30 group-hover:bg-black/40 transition-colors">
                                        <span class="material-symbols-outlined text-white text-[20px]">play_arrow</span>
                                    </div>
                                </div>
                                <div class="absolute bottom-2 left-2 px-2 py-0.5 bg-black/60 backdrop-blur-sm text-[8px] font-black uppercase tracking-widest text-white border border-white/10">
                                    Résultat Vidéo
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-4 flex flex-col gap-1">
                            <h3 class="text-xl font-medium tracking-tight text-on-surface">${card.title || 'Sans titre'}</h3>
                            <div class="flex justify-between items-center">
                                <span class="text-[0.6875rem] font-bold uppercase tracking-widest text-zinc-400">${displayType}</span>
                                ${card.corrective ? '<span class="text-[10px] font-bold uppercase text-red-500 bg-red-50 px-1.5 py-0.5">Correctif</span>' : ''}
                            </div>
                            ${card.corrective ? `<p class="mt-2 text-[11px] text-red-600 line-clamp-2 leading-tight bg-red-50/30 p-2 border-l-2 border-red-500">${card.corrective}</p>` : ''}
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="border-2 border-dashed border-zinc-200 h-48 sm:h-64 flex flex-col items-center justify-center cursor-pointer hover:border-zinc-400 hover:bg-zinc-50/50 transition-all" onclick="openCard(${weekId}, ${cardIdx})">
                        <span class="material-symbols-outlined text-[28px] text-zinc-300 mb-2">add_photo_alternate</span>
                        <p class="text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-zinc-400">${displayType}</p>
                    </div>
                `;
            }
        }

        // ── Navigation & Carousel ────────────────────────────
        function openCard(weekId, cardIdx) {
            window.location.href = `card-detail.html?weekId=${weekId}&cardIdx=${cardIdx}`;
        }

        let carouselInterval = null;
        function startCarousel(el, weekId, cardIdx) {
            const week = boardWeeks.find(w => w.id === weekId);
            if (!week) return;
            const card = week.cards[cardIdx];
            
            // Handle both old string format and new object format for gallery
            const galleryImages = (card.gallery || [])
                .map(item => item && typeof item === 'object' ? item.url : item)
                .filter(url => url);
                
            const images = [card.image, ...galleryImages];
            
            if (images.length <= 1) return;

            let idx = 0;
            const imgEl = el.querySelector('.card-thumb');
            
            carouselInterval = setInterval(() => {
                idx = (idx + 1) % images.length;
                imgEl.src = images[idx];
            }, 1500);
        }

        function stopCarousel(el, originalImage) {
            clearInterval(carouselInterval);
            const imgEl = el.querySelector('.card-thumb');
            imgEl.src = originalImage;
        }

        async function clearCardById(weekId, cardIdx) {
            if (!confirm('Voulez-vous supprimer cette image de couverture ?')) return;
            
            // Optimistic update for instant UI response
            const localWeek = boardWeeks.find(w => w.id === weekId);
            if (localWeek && localWeek.cards[cardIdx]) {
                localWeek.cards[cardIdx].image = '';
                localWeek.cards[cardIdx].title = '';
                renderDynamicWeeks();
            }

            const week = await dbGetWeekById(weekId);
            const card = week.cards[cardIdx];
            card.title = '';
            card.image = '';
            const ok = await dbUpdateWeek(week);
            if (!ok) {
                const reason = (typeof dbGetLastError === 'function' ? dbGetLastError() : '') || 'Cause inconnue';
                alert(`Erreur de sauvegarde BDD: ${reason}`);
                // Rollback if failed
                boardWeeks = await dbGetAllWeeks();
                renderDynamicWeeks();
                return;
            }
            // Silent sync
            boardWeeks = await dbGetAllWeeks();
            renderDynamicWeeks();
        }

        async function deleteWeek(id) {
            if (!confirm('Supprimer cette semaine et tout son contenu ?')) return;

            // Optimistic UI update: remove from local state immediately
            boardWeeks = boardWeeks.filter(w => String(w.id) !== String(id));
            await renumberWeeks(); 

            const ok = await dbDeleteWeek(id);
            if (!ok) {
                const reason = (typeof dbGetLastError === 'function' ? dbGetLastError() : '') || 'Suppression desactivee';
                alert(reason);
                // Rollback if something went wrong
                boardWeeks = await dbGetAllWeeks();
                renderDynamicWeeks();
                return;
            }
        }

        async function resetBoard() {
            if (!confirm('ATTENTION: Cela va supprimer TOUTES les semaines ET TOUTES les images (cloud + local). Continuer ?')) return;
            const ok = await dbWipeAllData();
            if (!ok) {
                const reason = (typeof dbGetLastError === 'function' ? dbGetLastError() : '') || 'Reset desactive';
                alert(reason);
                return;
            }
            boardWeeks = [];
            renderDynamicWeeks();
            alert('Nettoyage complet terminé.');
        }

        // ── Init ───────────────────────────────────────────────
        window.addEventListener('pageshow', (event) => {
            // If the page was loaded from the bfcache (user navigated back), force a reload
            // to ensure changes made in other pages are visible immediately.
            if (event.persisted) {
                window.location.reload();
            }
        });

        initBoard();
    </script>
</body>

</html>
